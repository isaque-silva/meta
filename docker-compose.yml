services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-metas_app}
      MYSQL_USER: ${MYSQL_USER:-metas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-metas123}
      TZ: ${TZ:-America/Sao_Paulo}
    healthcheck:
      disable: true
    volumes:
      - metas_mysql_data:/var/lib/mysql
    networks:
      - metas_net

  metas-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3010}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_CLIENT: mysql
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-metas_app}
      MYSQL_USER: ${MYSQL_USER:-metas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-metas123}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-change-this-in-production}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-720}
      DEFAULT_ADMIN_USER: ${DEFAULT_ADMIN_USER:-admin}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-admin123}
      TZ: ${TZ:-America/Sao_Paulo}
    networks:
      - metas_net

volumes:
  metas_mysql_data:

networks:
  metas_net:
