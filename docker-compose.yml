version: "3.9"

services:
  metas-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: metas-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/metas.db
      AUTH_TOKEN_SECRET: change-this-in-production
      AUTH_TOKEN_TTL_HOURS: 720
      DEFAULT_ADMIN_USER: admin
      DEFAULT_ADMIN_PASSWORD: admin123
    volumes:
      - metas_data:/app/data

volumes:
  metas_data:
